{% extends "layout.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Liste des Serveurs Web</h2>
    <a href="/ws/create" class="btn btn-success">Ajouter un Serveur</a>
</div>

<table class="table table-striped">
    <thead>
        <tr>
            <th>Nom</th>
            <th>IP</th>
            <th>Port</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for server in servers %}
        <tr>
            <td>{{ server.name }}</td>
            <td>{{ server.ip }}</td>
            <td>{{ server.port }}</td>
            <td>
                <a href="/ws/{{ server.id }}" class="btn btn-sm btn-info">Voir Config Nginx</a>
                <a href="/ws/delete/{{ server.id }}" class="btn btn-sm btn-danger" onclick="return confirm('Supprimer ce serveur ?')">Supprimer</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
